name: 'dbt_wizard_hol'
version: '1.0.0'

profile: 'dbt_hands_on_lab_profile'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Customer tier thresholds (lifetime revenue in dollars)
  platinum_threshold: 500
  gold_threshold: 200
  silver_threshold: 50

  # Lookback window for active customer definition (days since last order)
  active_customer_days: 365

models:
  dbt_wizard_hol:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: view
      +schema: intermediate

    marts:
      +materialized: table
      +schema: marts
      core:
        +materialized: table
      marketing:
        +materialized: table
