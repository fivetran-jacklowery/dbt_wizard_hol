version: 2

models:
  - name: agg_customer_cohorts
    description: >
      Customer cohort analysis — groups customers by first-order month and
      segments by customer_type and region. Tracks revenue, conversion rate,
      and retention per cohort slice.
    columns:
      - name: cohort_month
        description: First day of the month in which the cohort placed their first order.
        tests:
          - not_null
      - name: customer_type
        description: Customer segment for this cohort slice.
        tests:
          - not_null
      - name: region
        description: Geographic region for this cohort slice.
        tests:
          - not_null
      - name: cohort_size
        description: Total customers in this cohort slice.
        tests:
          - not_null
      - name: purchase_conversion_rate
        description: Fraction of cohort customers who placed at least one order.
        tests:
          - not_null

  - name: agg_promotion_performance
    description: >
      Promotion performance analysis — joins active promotions to completed
      order revenue within the promotion date window for the applicable
      product category. One row per promotion.
    columns:
      - name: promotion_id
        description: Primary key — unique per promotion.
        tests:
          - unique
          - not_null
      - name: promotion_name
        description: Human-readable name of the promotion.
        tests:
          - not_null
      - name: gross_revenue_in_window
        description: Sum of line item revenue for the applicable category during the promotion window.
      - name: net_revenue_in_window
        description: Discount-adjusted revenue for the applicable category during the promotion window.
