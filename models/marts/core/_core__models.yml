version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension — one row per customer. Combines identity, location,
      lifetime order metrics, and support history. The customer_tier field is
      driven by the classify_customer_tier macro and the platinum/gold/silver
      project variables.
    columns:
      - name: customer_id
        description: Primary key — unique per customer.
        tests:
          - unique
          - not_null
      - name: email
        description: Unique customer email address.
        tests:
          - unique
          - not_null
      - name: customer_tier
        description: Tier assigned based on lifetime revenue (bronze/silver/gold/platinum).
        tests:
          - not_null
          - accepted_values:
              values: ['bronze', 'silver', 'gold', 'platinum']
      - name: has_ever_ordered
        description: True if the customer has placed at least one non-pending, non-cancelled order.
        tests:
          - not_null
      - name: is_active
        description: True if the customer ordered within the active_customer_days window.
        tests:
          - not_null

  - name: dim_products
    description: >
      Product dimension — one row per product. Joins the product catalog with
      subcategory and category taxonomy, sales performance metrics, and
      aggregated review data.
    columns:
      - name: product_id
        description: Primary key — unique per product.
        tests:
          - unique
          - not_null
      - name: sku
        description: Stock keeping unit — unique per product.
        tests:
          - unique
          - not_null
      - name: price_tier
        description: Budget / mid-range / premium bucketing based on unit price.
        tests:
          - accepted_values:
              values: ['budget', 'mid-range', 'premium']

  - name: fct_orders
    description: >
      Order fact table — one row per order. Contains financial totals from the
      order record plus line-item-derived revenue aggregates and status flags.
    columns:
      - name: order_id
        description: Primary key — unique per order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to dim_customers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
              config:
                severity: warn
      - name: order_status
        description: Current order status.
        tests:
          - accepted_values:
              values: ['completed', 'returned', 'pending', 'cancelled', 'processing', 'shipped', 'delivered']
      - name: total_amount
        description: Total billed to the customer including tax and shipping.
        tests:
          - not_null

  - name: fct_order_items
    description: >
      Order item fact table — one row per line item. Includes denormalized
      product taxonomy and discount-adjusted revenue.
    columns:
      - name: order_item_id
        description: Primary key — unique per order line item.
        tests:
          - unique
          - not_null
      - name: order_id
        description: Foreign key to fct_orders.
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_id
      - name: line_revenue
        description: Gross revenue for this line item before discount.
        tests:
          - not_null
      - name: line_revenue_after_discount
        description: Net revenue for this line item after applying discount_pct.
        tests:
          - not_null

  - name: fct_tickets
    description: >
      Support ticket fact table — one row per customer support ticket.
      Denormalized with customer and order context.
    columns:
      - name: ticket_id
        description: Primary key — unique per ticket.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to dim_customers.
        tests:
          - not_null
      - name: ticket_status
        description: Current status of the ticket.
        tests:
          - accepted_values:
              values: ['open', 'in_progress', 'resolved', 'closed']
      - name: priority
        description: Ticket priority level.
        tests:
          - accepted_values:
              values: ['low', 'medium', 'high', 'critical']

  - name: fct_inventory_transactions
    description: >
      Inventory transaction fact table — one row per inventory movement event.
      Denormalized with product and warehouse context.
    columns:
      - name: transaction_id
        description: Primary key — unique per transaction.
        tests:
          - unique
          - not_null
      - name: product_id
        description: Foreign key to dim_products.
        tests:
          - not_null
      - name: warehouse_id
        description: Foreign key to the warehouse dimension.
        tests:
          - not_null
      - name: transaction_type
        description: Type of inventory movement.
        tests:
          - not_null

  - name: agg_daily_revenue
    description: >
      Daily aggregated revenue summary. Includes a 7-day rolling average and
      cumulative revenue computed with window functions. Restricted to
      completed orders.
    columns:
      - name: order_date
        description: Primary key — unique per calendar day with completed orders.
        tests:
          - unique
          - not_null
      - name: daily_revenue
        description: Total line-item revenue for completed orders on this day.
        tests:
          - not_null

  - name: agg_monthly_revenue
    description: >
      Monthly revenue rollup with month-over-month growth rate. Derived from
      int_daily_revenue by aggregating across order dates.
    columns:
      - name: order_month
        description: First day of the calendar month (primary key).
        tests:
          - unique
          - not_null

  - name: ordes_by_week
    description: >
      Weekly order rollup — one row per calendar week with order count, gross
      revenue, and distinct customer count.
    columns:
      - name: order_week
        description: First day of the calendar week represented by this row.
        tests:
          - unique
          - not_null
      - name: order_count
        description: Count of orders placed during the week.
        tests:
          - not_null
      - name: gross_revenue
        description: Sum of gross order revenue during the week.
        tests:
          - not_null
      - name: distinct_customers
        description: Count of distinct customers who placed orders during the week.
        tests:
          - not_null

  - name: agg_product_performance
    description: >
      Product performance rankings by revenue, volume, and customer ratings.
      Includes within-category rankings and revenue share percentages.
    columns:
      - name: product_id
        description: Primary key — unique per product.
        tests:
          - unique
          - not_null

  - name: customer_lifetime_value
    description: >
      Customer CLV model — combines actual spend history with a simple
      12-month revenue projection based on order velocity. Includes support
      profile summary.
    columns:
      - name: customer_id
        description: Primary key — one row per customer who has ordered.
        tests:
          - unique
          - not_null

  - name: order_margin_analysis
    description: >
      Order-level discount depth analysis. Bands orders by discount percentage
      (no discount / light / moderate / heavy). Excludes pending and cancelled orders.
    columns:
      - name: order_id
        description: Primary key — unique per order.
        tests:
          - unique
          - not_null
      - name: discount_band
        description: Discount depth bucket based on applied discount percentage.
        tests:
          - not_null
          - accepted_values:
              values: ['no discount', 'light (<10%)', 'moderate (10–20%)', 'heavy (20%+)']
