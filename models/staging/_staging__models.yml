version: 2

models:
  - name: stg_customers
    description: Staged customer records — cleaned and type-cast from the raw seed.
    columns:
      - name: customer_id
        description: Primary key for the customer.
        tests:
          - unique
          - not_null
      - name: email
        description: Customer email address (lowercased).
        tests:
          - unique
          - not_null
      - name: referral_source
        description: Channel through which the customer was acquired.
        tests:
          - accepted_values:
              config:
                severity: warn
              values: ['google', 'facebook', 'organic', 'referral', 'instagram']
      - name: signup_date
        description: Date the customer created their account.
        tests:
          - not_null

  - name: stg_orders
    description: Staged order records with normalized status and shipping fields.
    columns:
      - name: order_id
        description: Primary key for the order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to stg_customers.
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: status
        description: Current status of the order.
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'returned', 'pending']
      - name: order_date
        description: Date the order was placed.
        tests:
          - not_null

  - name: stg_order_items
    description: Staged order line items with computed line totals.
    columns:
      - name: order_item_id
        description: Primary key for the order item.
        tests:
          - unique
          - not_null
      - name: order_id
        description: Foreign key to stg_orders.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_id
        description: Foreign key to stg_products.
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: quantity
        description: Number of units ordered for this line item.
        tests:
          - not_null
      - name: line_total_cents
        description: Total revenue for this line (quantity × unit price), in cents.
        tests:
          - not_null

  - name: stg_products
    description: Staged product catalog with pricing, cost, and margin fields.
    columns:
      - name: product_id
        description: Primary key for the product.
        tests:
          - unique
          - not_null
      - name: sku
        description: Stock keeping unit identifier.
        tests:
          - unique
          - not_null
      - name: category_id
        description: Foreign key to stg_product_categories.
        tests:
          - not_null
          - relationships:
              to: ref('stg_product_categories')
              field: category_id
      - name: unit_price_cents
        description: Listed selling price in cents.
        tests:
          - not_null
      - name: unit_cost_cents
        description: Unit cost in cents.
        tests:
          - not_null

  - name: stg_product_categories
    description: Lookup table for product categories and departments.
    columns:
      - name: category_id
        description: Primary key for the category.
        tests:
          - unique
          - not_null
      - name: category_name
        description: Human-readable category name.
        tests:
          - not_null
      - name: department
        description: High-level department grouping.
        tests:
          - not_null
          - accepted_values:
              values: ['footwear', 'apparel', 'accessories', 'gear', 'electronics']

  - name: stg_payments
    description: Staged payment transactions linked to orders.
    columns:
      - name: payment_id
        description: Primary key for the payment.
        tests:
          - unique
          - not_null
      - name: order_id
        description: Foreign key to stg_orders.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: payment_method
        description: Payment instrument used.
        tests:
          - accepted_values:
              values: ['credit_card', 'debit_card', 'paypal']
      - name: payment_status
        description: Final status of the payment attempt.
        tests:
          - not_null
          - accepted_values:
              values: ['success', 'refunded', 'pending']
