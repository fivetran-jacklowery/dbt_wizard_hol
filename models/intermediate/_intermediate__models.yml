version: 2

models:
  - name: int_orders_enriched
    description: >
      Orders enriched with derived status flags and date parts. No payment
      table exists in this schema; all financial totals come from the order
      record itself.
    columns:
      - name: order_id
        description: Primary key — unique per order.
        tests:
          - unique
          - not_null
      - name: order_status
        description: Lowercased order status.
        tests:
          - not_null
      - name: is_completed
        description: True if order_status = 'completed'.
        tests:
          - not_null

  - name: int_order_items_enriched
    description: >
      Order line items joined to product and full category taxonomy. Computes
      discount-adjusted line revenue.
    columns:
      - name: order_item_id
        description: Primary key — unique per line item.
        tests:
          - unique
          - not_null
      - name: line_revenue
        description: Gross revenue for the line item (from source line_total).
        tests:
          - not_null
      - name: line_revenue_after_discount
        description: Net revenue after applying discount_pct to line_revenue.
        tests:
          - not_null

  - name: int_products_enriched
    description: >
      Products joined to subcategory and category taxonomy with a price tier
      bucket assigned.
    columns:
      - name: product_id
        description: Primary key — unique per product.
        tests:
          - unique
          - not_null
      - name: price_tier
        description: Budget / mid-range / premium based on unit_price.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['budget', 'mid-range', 'premium']

  - name: int_customer_order_summary
    description: >
      Per-customer lifetime order aggregates. Excludes pending and cancelled
      orders. Used by dim_customers and customer_lifetime_value.
    columns:
      - name: customer_id
        description: Primary key — one row per customer who has completed/returned orders.
        tests:
          - unique
          - not_null
      - name: total_orders
        description: Count of non-pending, non-cancelled orders.
        tests:
          - not_null
      - name: lifetime_revenue
        description: Sum of pre-discount line revenue across all qualifying orders.
        tests:
          - not_null

  - name: int_daily_revenue
    description: >
      Completed order revenue aggregated by calendar day. Feeds
      agg_daily_revenue and agg_monthly_revenue.
    columns:
      - name: order_date
        description: Primary key — unique per day with completed orders.
        tests:
          - unique
          - not_null

  - name: int_product_sales_summary
    description: >
      Per-product rollup of sales volume and revenue for completed orders.
      Feeds dim_products and agg_product_performance.
    columns:
      - name: product_id
        description: Primary key — unique per product with at least one completed sale.
        tests:
          - unique
          - not_null

  - name: int_customer_cohorts
    description: >
      Assigns each customer to their first-order-month cohort. Computes
      days_to_first_order and the is_active_customer flag.
    columns:
      - name: customer_id
        description: Primary key — unique per customer.
        tests:
          - unique
          - not_null

  - name: int_customer_support_summary
    description: >
      Per-customer aggregation of support ticket counts and resolution metrics.
    columns:
      - name: customer_id
        description: Primary key — one row per customer with at least one ticket.
        tests:
          - unique
          - not_null

  - name: int_inventory_status
    description: >
      Current inventory levels per product per warehouse with reorder flags
      and days-since-restock. Joins product and warehouse context.
    columns:
      - name: inventory_id
        description: Primary key — unique per inventory record.
        tests:
          - unique
          - not_null
      - name: needs_reorder
        description: True if quantity_on_hand <= reorder_point.
        tests:
          - not_null

  - name: int_product_reviews_summary
    description: >
      Per-product aggregation of review ratings and verified purchase rates.
    columns:
      - name: product_id
        description: Primary key — one row per product with at least one review.
        tests:
          - unique
          - not_null
      - name: avg_rating
        description: Average customer rating (1–5 scale).
